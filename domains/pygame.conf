# pygame.conf — Python / pygame development domain.
#
# Sourced by both bin/start.sh (host) and core/entrypoint.sh (container).
# Use only $HOME-relative paths or absolute paths — $HOME means different
# things on each side, but in practice every reference here is host-side.

# Required host repos to bring up before launching the sandbox.
MCP_REPOS=(
    "$HOME/Projects/mcp-pygame"
)

# Optional repos: started if cloned; ignored silently if absent. mcp-dosre
# is cross-domain (binary analysis), useful from any sandbox.
OPTIONAL_REPOS=(
    "$HOME/Projects/mcp-dosre"
)

# Required MCP services to register inside the container. "name|url" pairs.
SERVICES=(
    "pygame-build|http://localhost:5172/mcp"
    "pygame-knowledge|http://localhost:5174/mcp"
)

# Probed at register time; registered only if reachable. Pairs with
# OPTIONAL_REPOS — if the repo is present, start.sh boots its services
# (so the probe will see them); if absent, the probe simply fails.
OPTIONAL_SERVICES=(
    "dos-re|http://localhost:5175/mcp"
    "dos-re-knowledge|http://localhost:5176/mcp"
)

# Read-only mounts into the sandbox container. host:container[:opts]
EXTRA_MOUNTS=(
    "$HOME/Projects/mcp-pygame/docs:/workspace/docs:ro,Z"
)

# Extra env vars passed into the container (KEY=VALUE).
EXTRA_ENV=()
