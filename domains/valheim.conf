# valheim.conf — Valheim mod development domain.
#
# Brings up the three valheim subservices (build/control/knowledge) plus
# the cross-domain mcp-steam (process control for the Steam client).

MCP_REPOS=(
    "$HOME/Projects/mcp-valheim"
    "$HOME/Projects/mcp-steam"
)

# No optional repos for valheim today. Add cross-domain helpers here if needed.
OPTIONAL_REPOS=()

SERVICES=(
    "valheim-build|http://localhost:5182/mcp"
    "valheim-control|http://localhost:5173/mcp"
    "valheim-knowledge|http://localhost:5184/mcp"
    "steam|http://localhost:5174/mcp"
)

OPTIONAL_SERVICES=()

# Mount the Valheim install dirs read-write so build artifacts / save data
# are reachable; mount the curated docs read-only.
EXTRA_MOUNTS=(
    "$HOME/Projects/mcp-valheim/docs:/workspace/docs:ro,Z"
    "$HOME/.steam/steam/steamapps/common/Valheim dedicated server:/workspace/valheim/server:Z"
    "$HOME/.steam/steam/steamapps/common/Valheim:/workspace/valheim/client:Z"
)

EXTRA_ENV=()
